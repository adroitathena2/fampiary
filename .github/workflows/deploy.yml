name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if that is your default branch

# Sets permissions of the GITHUB_TOKEN to allow deployment
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can change this to match your local Node version

      - name: Install Dependencies
        run: npm ci # 'npm ci' is generally better for CI/CD than 'npm install'

      - name: Build the App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist